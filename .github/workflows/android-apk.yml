name: Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "mobile_isolated/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "mobile_isolated/**"
      - ".github/workflows/android-apk.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_isolated
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.15.0"
          cache: "npm"
          cache-dependency-path: mobile_isolated/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-36 build-tools;36.0.0 ndk;27.1.12297006

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and unit tests
        run: npm run test:ci

      - name: Build release APK
        run: npm run android:apk:release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: ani-stock-mobile-release-apk
          path: mobile_isolated/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
