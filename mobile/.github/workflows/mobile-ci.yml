name: Mobile CI

on:
  push:
    paths:
      - "mobile/**"
  pull_request:
    paths:
      - "mobile/**"

jobs:
  mobile-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
